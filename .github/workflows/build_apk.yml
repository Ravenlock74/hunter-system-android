name: Build Kivy/KivyMD Android APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext build-essential
 
      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          sudo update-java-alternatives --set temurin-17-jdk-amd64 || true
 
      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip setuptools
          pip install --user --upgrade "cython==0.29.33" virtualenv
          pip install --user --upgrade buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH
 
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
 
      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug
 
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunter-apk
          path: bin/*.apk
