name: Build Android APK Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev lld

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Initialize Buildozer and Create Spec
        run: |
          buildozer init
          # Menyesuaikan agar buildozer menggunakan KivyMD dan Kivy otomatis
          sed -i 's/# requirements = python3,kivy/requirements = python3,kivy,kivymd/g' buildozer.spec
          sed -i 's/package.name = myapp/package.name = huntersystem/g' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.taffin/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunter-app-apk
          path: bin/*.apk
