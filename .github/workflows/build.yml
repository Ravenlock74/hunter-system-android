name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet CLI
        run: |
          pip install flet

      - name: Build APK via Flet Cloud
        run: |
          flet build apk --no-android-sdk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hunter-app-apk
          path: build/apk/*.apk
